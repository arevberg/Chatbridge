<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatBridge</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0f14;
    --surface: #161920;
    --surface2: #1e2230;
    --border: #2a2f42;
    --accent-a: #4f8aff;
    --accent-b: #ff6b6b;
    --text: #e8eaf2;
    --text-muted: #6b7394;
    --bubble-you: #1a2540;
    --bubble-her: #2a1a1a;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Login screen ── */
  #login-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    gap: 32px;
  }

  .logo-big {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 2.4rem;
    background: linear-gradient(135deg, var(--accent-a), var(--accent-b));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .tagline {
    font-size: 0.9rem;
    color: var(--text-muted);
    text-align: center;
    margin-top: -20px;
  }

  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 24px;
    width: 100%;
    max-width: 360px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .login-card h2 {
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--text);
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .field label {
    font-size: 0.72rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
  }

  .field input, .field select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.92rem;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }

  .field input:focus { border-color: var(--accent-a); }
  .field select { cursor: pointer; }

  .big-btn {
    background: linear-gradient(135deg, var(--accent-a), #3a6fd4);
    border: none;
    border-radius: 10px;
    color: #fff;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    padding: 13px;
    transition: opacity 0.15s, transform 0.1s;
    width: 100%;
  }

  .big-btn:active { transform: scale(0.98); }
  .big-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Chat screen ── */
  #chat-screen { display: none; flex-direction: column; height: 100dvh; }

  header {
    padding: 12px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .logo-sm {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.1rem;
    background: linear-gradient(135deg, var(--accent-a), var(--accent-b));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .room-badge {
    margin-left: auto;
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px 10px;
    color: var(--text-muted);
  }

  .online-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #4caf7d;
    box-shadow: 0 0 6px #4caf7d;
    flex-shrink: 0;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar { width: 3px; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg-group {
    display: flex;
    flex-direction: column;
    max-width: 80%;
    gap: 3px;
    animation: fadeUp 0.2s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg-group.mine { align-self: flex-end; align-items: flex-end; }
  .msg-group.theirs { align-self: flex-start; align-items: flex-start; }

  .sender-name {
    font-size: 0.62rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 1px;
  }

  .mine .sender-name { color: var(--accent-a); }
  .theirs .sender-name { color: var(--accent-b); }

  .bubble {
    padding: 9px 13px;
    border-radius: 14px;
    font-size: 0.91rem;
    line-height: 1.5;
  }

  .mine .bubble.original {
    background: var(--bubble-you);
    border: 1px solid rgba(79,138,255,0.25);
    border-bottom-right-radius: 4px;
  }

  .theirs .bubble.original {
    background: var(--bubble-her);
    border: 1px solid rgba(255,107,107,0.25);
    border-bottom-left-radius: 4px;
  }

  .bubble.translation {
    font-style: italic;
    font-size: 0.8rem;
    color: #8a9aaa;
    padding: 5px 13px 7px;
    border-top: none;
  }

  .mine .bubble.translation {
    background: #111825;
    border: 1px solid rgba(79,138,255,0.1);
    border-top: none;
    border-bottom-right-radius: 14px;
    border-top-right-radius: 4px;
  }

  .theirs .bubble.translation {
    background: #180f0f;
    border: 1px solid rgba(255,107,107,0.1);
    border-top: none;
    border-bottom-left-radius: 14px;
    border-top-left-radius: 4px;
  }

  .trans-label {
    display: block;
    font-size: 0.58rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    opacity: 0.45;
    font-style: normal;
    font-weight: 700;
    margin-bottom: 2px;
  }

  .dots { display: flex; gap: 3px; align-items: center; padding: 4px 0; }
  .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--text-muted); animation: bounce 1s infinite; }
  .dot:nth-child(2) { animation-delay: 0.15s; }
  .dot:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce {
    0%,80%,100% { transform: translateY(0); opacity:0.3; }
    40% { transform: translateY(-4px); opacity:1; }
  }

  /* Input bar */
  .input-bar {
    flex-shrink: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 10px 12px;
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }

  #msg-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.91rem;
    line-height: 1.45;
    padding: 9px 12px;
    resize: none;
    height: 42px;
    max-height: 120px;
    outline: none;
    transition: border-color 0.2s;
    overflow-y: auto;
  }

  #msg-input:focus { border-color: var(--accent-a); }

  #send-btn {
    background: var(--accent-a);
    border: none;
    border-radius: 10px;
    color: #fff;
    cursor: pointer;
    font-size: 1.1rem;
    width: 42px;
    height: 42px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.15s, transform 0.1s;
  }

  #send-btn:active { transform: scale(0.93); }
  #send-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .empty-chat {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: var(--text-muted);
    text-align: center;
    padding: 20px;
    font-size: 0.85rem;
  }

  .empty-chat .icon { font-size: 2.2rem; margin-bottom: 6px; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div>
    <div class="logo-big">ChatBridge</div>
    <p class="tagline">Real-time chat with auto-translation 🌐</p>
  </div>

  <div class="login-card">
    <h2>Join your chat room</h2>

    <div class="field">
      <label>Your name</label>
      <input type="text" id="username" placeholder="e.g. Are" maxlength="20" />
    </div>

    <div class="field">
      <label>I speak</label>
      <select id="user-lang">
        <option value="English">🇬🇧 English</option>
        <option value="Spanish">🇧🇴 Spanish</option>
      </select>
    </div>

    <div class="field">
      <label>Room code <span style="color:var(--text-muted);font-weight:400;text-transform:none;letter-spacing:0">(share this with her so you're in the same room)</span></label>
      <input type="text" id="room-code" placeholder="e.g. are-laura-2024" maxlength="30" />
    </div>

    <button class="big-btn" onclick="joinChat()">Enter Chat →</button>
  </div>
</div>

<!-- CHAT -->
<div id="chat-screen">
  <header>
    <div class="logo-sm">ChatBridge</div>
    <div class="online-dot" id="online-dot"></div>
    <div class="room-badge" id="room-badge">room</div>
  </header>

  <div id="messages">
    <div class="empty-chat" id="empty-msg">
      <div class="icon">💬</div>
      <div>No messages yet.<br>Say hello!</div>
    </div>
  </div>

  <div class="input-bar">
    <textarea id="msg-input" placeholder="Type a message…" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
  // ── CONFIG — filled in by setup ──
  const SUPABASE_URL = 'https://fywxuppbkszwzkezdanc.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ5d3h1cHBia3N6d3prZXpkYW5jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3NTM2NDksImV4cCI6MjA5MzMyOTY0OX0.cJDvHPPPyy8fvpn3CtI6E_M6UpBetIqs-KPO52ysW98';
  const ANTHROPIC_KEY = ''; // Now handled server-side

  let sb, currentUser, currentRoom, myLang, channel;
  let renderedIds = new Set();

  async function joinChat() {
    const name = document.getElementById('username').value.trim();
    const lang = document.getElementById('user-lang').value;
    const room = document.getElementById('room-code').value.trim().toLowerCase().replace(/\s+/g, '-');

    if (!name || !room) return alert('Please fill in your name and a room code.');

    currentUser = name;
    myLang = lang;
    currentRoom = room;

    sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('chat-screen').style.display = 'flex';
    document.getElementById('room-badge').textContent = `#${room}`;

    await loadHistory();
    subscribeRealtime();
  }

  async function loadHistory() {
    const { data } = await sb
      .from('messages')
      .select('*')
      .eq('room', currentRoom)
      .order('created_at', { ascending: true });

    if (data) data.forEach(renderMessage);
  }

  function subscribeRealtime() {
    channel = sb.channel(`room:${currentRoom}`)
      .on('postgres_changes', {
        event: 'INSERT',
        schema: 'public',
        table: 'messages',
        filter: `room=eq.${currentRoom}`
      }, payload => {
        if (!renderedIds.has(payload.new.id)) renderMessage(payload.new);
      })
      .subscribe(status => {
        document.getElementById('online-dot').style.background =
          status === 'SUBSCRIBED' ? '#4caf7d' : '#ff6b6b';
      });
  }

  function renderMessage(msg) {
    renderedIds.add(msg.id);
    document.getElementById('empty-msg')?.remove();

    const container = document.getElementById('messages');
    const isMine = msg.sender === currentUser;

    const group = document.createElement('div');
    group.className = `msg-group ${isMine ? 'mine' : 'theirs'}`;
    group.dataset.id = msg.id;

    const nameEl = document.createElement('div');
    nameEl.className = 'sender-name';
    nameEl.textContent = `${msg.sender} · ${msg.sender_lang}`;

    const originalBubble = document.createElement('div');
    originalBubble.className = 'bubble original';
    originalBubble.textContent = msg.original;

    group.appendChild(nameEl);
    group.appendChild(originalBubble);

    // Show translation if it's not in our language
    if (msg.sender_lang !== myLang) {
      const transBubble = document.createElement('div');
      transBubble.className = 'bubble translation';

      if (msg.translation) {
        transBubble.innerHTML = `<span class="trans-label">→ ${myLang}</span>${msg.translation}`;
      } else {
        transBubble.innerHTML = `<span class="trans-label">→ ${myLang}</span><span class="dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span>`;
        // Poll for translation
        pollForTranslation(msg.id, transBubble);
      }
      group.appendChild(transBubble);
    }

    container.appendChild(group);
    container.scrollTop = container.scrollHeight;
  }

  async function pollForTranslation(id, el) {
    for (let i = 0; i < 20; i++) {
      await new Promise(r => setTimeout(r, 1500));
      const { data } = await sb.from('messages').select('translation').eq('id', id).single();
      if (data?.translation) {
        el.innerHTML = `<span class="trans-label">→ ${myLang}</span>${data.translation}`;
        return;
      }
    }
  }

  async function sendMessage() {
    const input = document.getElementById('msg-input');
    const btn = document.getElementById('send-btn');
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    input.style.height = '42px';
    btn.disabled = true;

    // Insert message without translation first
    const { data: inserted } = await sb.from('messages').insert({
      room: currentRoom,
      sender: currentUser,
      sender_lang: myLang,
      original: text,
      translation: null
    }).select().single();

    // Translate and update
    if (inserted) {
      try {
        const translated = await translateText(text, myLang);
        await sb.from('messages').update({ translation: translated }).eq('id', inserted.id);
      } catch(e) {
        console.error('Translation failed', e);
      }
    }

    btn.disabled = false;
  }

  async function translateText(text, fromLang) {
    const toLang = fromLang === 'Spanish' ? 'English' : 'Spanish';
    const response = await fetch('/api/translate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, fromLang, toLang })
    });
    const data = await response.json();
    return data.translated || '⚠️ Translation failed';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function autoResize(el) {
    el.style.height = '42px';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }
</script>
</body>
</html>
